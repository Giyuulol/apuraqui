name: apuraqui
description: "Aplicativo Flutter mobile para apoio ao eleitor brasileiro — santinhos digitais, perfis de candidatos, comparador de propostas, checklist de votação e dashboard de apuração."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.33.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Rawline
      fonts:
        - asset: assets/fonts/rawline/Rawline-Thin.ttf
          weight: 100
        - asset: assets/fonts/rawline/Rawline-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/rawline/Rawline-Light.ttf
          weight: 300
        - asset: assets/fonts/rawline/Rawline-Regular.ttf
          weight: 400
        - asset: assets/fonts/rawline/Rawline-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/rawline/Rawline-Medium.ttf
          weight: 500
        - asset: assets/fonts/rawline/Rawline-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/rawline/Rawline-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/rawline/Rawline-Bold.ttf
          weight: 700
        - asset: assets/fonts/rawline/Rawline-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/rawline/Rawline-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/rawline/Rawline-Black.ttf
          weight: 900
